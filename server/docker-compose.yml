services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "5233:8080"
    environment:
      ConnectionStrings__DbConnectionString: "Host=postgres;Database=postgres;Username=postgres;Password=postgres"
      ConnectionStrings__Secret: "windmill-inspector-jwt-secret-min-32-chars"
      Jwt__Secret: "windmill-inspector-jwt-secret-min-32-chars"
    depends_on:
      - postgres